<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval' http://49.212.175.205:3000 https://unpkg.com https://*.tile.openstreetmap.org; style-src 'self' 'unsafe-inline' https://unpkg.com; font-src 'self' data: https://unpkg.com; img-src * data: content:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <title>Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: #111;
            flex-shrink: 0;
        }

        #home-label {
            font-size: 16px;
            color: #fff;
        }

        #map-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        #all-btn {
            position: absolute;
            bottom: 10px;
            left: 12px;
            z-index: 1000;
            background: #2a2a2a;
            border: 2px solid #000;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            color: #eee;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #all-btn:active {
            background: #444;
        }

        #date-bar {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 12px;
            background: #111;
            flex-shrink: 0;
            width: 100%;
            min-width: 0;
            -webkit-overflow-scrolling: touch;
            transform: scaleY(-1);
        }

        #date-bar::-webkit-scrollbar {
            height: 20px;
        }

        #date-bar::-webkit-scrollbar-track {
            background: #222;
        }

        #date-bar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 2px;
        }

        .date-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            font-size: 9px;
            color: #eee;
            text-align: center;
            line-height: 1.4;
            transform: scaleY(-1);
            box-sizing: border-box;
        }

        #year-bar {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 12px;
            background: #111;
            flex-shrink: 0;
            width: 100%;
            min-width: 0;
            -webkit-overflow-scrolling: touch;
        }

        #year-bar::-webkit-scrollbar {
            height: 20px;
        }

        #year-bar::-webkit-scrollbar-track {
            background: #222;
        }

        #year-bar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 2px;
        }

        .year-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            font-size: 9px;
            color: #eee;
            text-align: center;
            line-height: 1.4;
            box-sizing: border-box;
        }

        .year-avatar:active {
            background: #444;
        }

        .point-label {
            background: none !important;
            border: none !important;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 0 0 3px #000, 0 0 3px #000, 0 0 3px #000;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="header">
        <span id="home-label">Home</span>
    </div>
    <div id="map-wrap">
        <div id="map"></div>
        <button id="all-btn">ALL</button>
    </div>
    <div id="year-bar"></div>
    <div id="date-bar"></div>

    <script src="js/home.js"></script>
</body>

</html>
