<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval' http://49.212.175.205:3000 http://toyohide.work https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com https://unpkg.com; media-src *; img-src * data: content:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <title>TokyoWalkLog</title>
</head>

<body>
    <div id="deviceready" style="display:none;"></div>

    <!-- テーブル画面 -->
    <div id="screen-table">
        <div id="link-container">
            <a href="tokyoTrainStation.html" target="_blank">リンク</a>
        </div>
        <div id="table-container">
            <table id="geoloc-table">
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>件数</th>
                        <th>面積(km²)</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="geoloc-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- マップ画面 -->
    <div id="screen-map" style="display:none;">
        <div id="map-header">
            <a id="back-btn" href="#">← 戻る</a>
            <span id="map-date-label"></span>
        </div>
        <div id="map">
            <button id="reset-btn">⊙</button>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
