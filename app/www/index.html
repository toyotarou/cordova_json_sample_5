<!DOCTYPE html>

<html lang="ja">

<head>
    <meta charset="utf-8">

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval' http://49.212.175.205:3000 http://toyohide.work https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com https://unpkg.com; media-src *; img-src * data: content:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <title>TokyoWalkLog</title>
</head>

<body>
    <div id="deviceready" style="display:none;"></div>

    <!-- テーブル画面 -->
    <div id="screen-table">
        <div id="link-container">
            <a href="#" id="station-link">station</a>
            <a href="#" id="home-link">home</a>
            <a href="#" id="temple-link">temple</a>
        </div>
        <div id="table-container">
            <table id="geoloc-table">
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>件数</th>
                        <th>面積(km²)</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="geoloc-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Station ダイアログ -->
    <div id="station-dialog-overlay">
        <div id="station-dialog">
            <iframe id="station-iframe" src="" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Temple ダイアログ -->
    <div id="temple-dialog-overlay">
        <div id="temple-dialog">
            <iframe id="temple-iframe" src="" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Home ダイアログ -->
    <div id="home-dialog-overlay">
        <div id="home-dialog">
            <iframe id="home-iframe" src="" frameborder="0"></iframe>
        </div>
    </div>

    <!-- Map ダイアログ -->
    <div id="map-dialog-overlay">
        <div id="map-dialog">
            <iframe id="map-iframe" src="" frameborder="0"></iframe>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
