<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' data: https://ssl.gstatic.com 'unsafe-eval' http://toyohide.work http://49.212.175.205:3000 https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com https://unpkg.com; img-src * data: content:;">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="parts/around-dialog.css">
    <title>Temple LatLng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 40px 16px;
        }
        #container {
            padding: 0 30px;
        }
        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: #fff;
        }
        .temple-row {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #111;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }
        .temple-row:first-child {
            border-radius: 4px 4px 0 0;
        }
        .temple-row:last-child {
            border-bottom: none;
            border-radius: 0 0 4px 4px;
        }
        .temple-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .temple-name {
            font-weight: 500;
            color: #eee;
        }
        .temple-address {
            font-size: 11px;
            color: #666;
        }
        .temple-coords {
            font-size: 10px;
            color: #555;
        }
        .temple-rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
            color: #000;
        }
        .rank-S { background-color: #FFD700; }
        .rank-A { background-color: #C0C0C0; }
        .rank-B { background-color: #CD7F32; }
        .rank-C { background-color: #666666; color: #ccc; }
        .temple-count {
            width: 64px;
            flex-shrink: 0;
            margin-left: 10px;
            text-align: center;
        }
        .count-btn {
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 4px;
            width: 64px;
            padding: 4px 0;
            font-size: 12px;
            cursor: pointer;
        }
        .count-btn:active {
            background: #1b5e20;
        }

    </style>
</head>

<body>
    <div id="container">
        <h1>Temple LatLng</h1>
        <div id="temple-list"></div>
    </div>

    <!-- TempleAround ダイアログ -->
    <div id="around-dialog-overlay">
        <div id="around-dialog">
            <iframe id="around-iframe" src="" frameborder="0"></iframe>
        </div>
    </div>

    <script src="parts/around-dialog.js"></script>
    <script src="js/templeLatLng.js"></script>
</body>

</html>
